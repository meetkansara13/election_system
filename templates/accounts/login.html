<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectionAI — Login</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #1a1d27;
            border: 1px solid #2d3148;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #6366f1;
        }

        .logo p {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        .tabs {
            display: flex;
            background: #0f1117;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #64748b;
            transition: all .2s;
        }

        .tab.active {
            background: #6366f1;
            color: #fff;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: #0f1117;
            border: 1px solid #2d3148;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
        }

        input:focus {
            border-color: #6366f1;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background .2s;
        }

        .btn:hover {
            background: #4f46e5;
        }

        .btn:disabled {
            background: #3d3f5e;
            cursor: not-allowed;
        }

        .error {
            background: #2d1b1b;
            border: 1px solid #7f1d1d;
            color: #fca5a5;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .success {
            background: #1a2e1a;
            border: 1px solid #166534;
            color: #86efac;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <h1>⚡ ElectionAI</h1>
            <p>Gujarat Assembly Elections Analytics</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Sign In</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <div id="err" class="error"></div>
        <div id="suc" class="success"></div>

        <!-- Login Panel -->
        <div id="panel-login" class="panel active">
            {% if error_message %}
            <div class="error" style="display: block;">{{ error_message }}</div>
            {% endif %}
            <form method="post" action="/login/">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next_url|default:'/dashboard/' }}">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" id="l-email" placeholder="you@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <button class="btn" type="submit" id="l-btn">Sign In</button>
            </form>
        </div>

        <!-- Register Panel -->
        <div id="panel-register" class="panel">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="r-name" placeholder="Your name">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="r-user" placeholder="username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="r-email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="r-pass" placeholder="Min 8 characters">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="r-pass2" placeholder="Repeat password">
            </div>
            <button class="btn" onclick="doRegister()" id="r-btn">Create Account</button>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + tab).classList.add('active');
            clearMessages();
        }

        function showErr(msg) {
            const el = document.getElementById('err');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('suc').style.display = 'none';
        }
        function showSuc(msg) {
            const el = document.getElementById('suc');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('err').style.display = 'none';
        }
        function clearMessages() {
            document.getElementById('err').style.display = 'none';
            document.getElementById('suc').style.display = 'none';
        }

        async function doRegister() {
            const btn = document.getElementById('r-btn');
            btn.disabled = true; btn.textContent = 'Creating…';
            clearMessages();
            try {
                const res = await fetch('/api/auth/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('r-email').value,
                        username: document.getElementById('r-user').value,
                        full_name: document.getElementById('r-name').value,
                        password: document.getElementById('r-pass').value,
                        password2: document.getElementById('r-pass2').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    const nextUrl = new URLSearchParams(window.location.search).get('next') || '/dashboard/';
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                    showSuc('Account created! Redirecting…');
                    setTimeout(() => window.location.href = nextUrl, 800);
                } else {
                    const errs = Object.values(data).flat();
                    showErr(errs[0] || 'Registration failed.');
                }
            } catch (e) {
                showErr('Network error. Please try again.');
            }
            btn.disabled = false; btn.textContent = 'Create Account';
        }

        // Enter key support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                if (!document.getElementById('panel-login').classList.contains('active')) doRegister();
            }
        });
    </script>
</body>

</html>
