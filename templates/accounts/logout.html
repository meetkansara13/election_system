<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=/login/">
    <title>Logging out...</title>
</head>
<body>
    <script>
        localStorage.removeItem('auth_token');
        localStorage.removeItem('auth_user');
        sessionStorage.clear();
        window.location.replace('/login/');
    </script>
</body>
</html>
